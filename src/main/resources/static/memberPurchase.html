<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员购买</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .member-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .member-card.selected {
            border: 3px solid #667eea;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .member-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .card-header {
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .card-duration {
            font-size: 14px;
            color: #666;
        }

        .card-price {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .card-price::before {
            content: '¥';
            font-size: 20px;
        }

        .card-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-size: 12px;
        }

        .buy-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .buy-button:hover {
            opacity: 0.9;
        }

        .buy-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 50px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 选择会员套餐</h1>
        
        <div id="loading" class="loading">加载中...</div>
        <div id="error"></div>
        
        <div id="memberGrid" class="member-grid" style="display: none;"></div>
        
        <button id="buyButton" class="buy-button" style="display: none;" onclick="purchase()">
            立即购买
        </button>
    </div>

    <script>
        let selectedMemberType = null;
        let memberTypes = [];

        // 加载会员类型列表
        async function loadMemberTypes() {
            try {
                const response = await fetch('/getMemberTypes');
                const data = await response.json();

                if (data.code === 1) {
                    memberTypes = data.data;
                    renderMemberTypes(memberTypes);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('memberGrid').style.display = 'grid';
                    document.getElementById('buyButton').style.display = 'block';
                } else {
                    showError('加载失败：' + data.msg);
                }
            } catch (error) {
                showError('网络错误：' + error.message);
            }
        }

        // 渲染会员类型卡片
        function renderMemberTypes(types) {
            const grid = document.getElementById('memberGrid');
            grid.innerHTML = types.map(type => `
                <div class="member-card" onclick="selectMemberType('${type.typeCode}')" data-type="${type.typeCode}">
                    <div class="card-header">
                        <div class="card-title">${type.name}</div>
                        <div class="card-duration">${type.durationText}</div>
                    </div>
                    
                    <div class="card-price">${type.price.toFixed(2)}</div>
                    
                    <div class="card-info">
                        <div class="info-item">
                            <span class="info-icon">📱</span>
                            <span>最多 ${type.maxDevices} 台设备</span>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">ℹ️</span>
                            <span>${type.description}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 选择会员类型
        function selectMemberType(typeCode) {
            // 移除之前的选中状态
            document.querySelectorAll('.member-card').forEach(card => {
                card.classList.remove('selected');
            });

            // 添加新的选中状态
            const selectedCard = document.querySelector(`[data-type="${typeCode}"]`);
            if (selectedCard) {
                selectedCard.classList.add('selected');
            }

            // 保存选中的会员类型
            selectedMemberType = memberTypes.find(t => t.typeCode === typeCode);
            
            console.log('选中会员类型:', selectedMemberType);
        }

        // 购买
        async function purchase() {
            if (!selectedMemberType) {
                alert('请先选择一个会员套餐');
                return;
            }

            // 生成订单号
            const orderId = 'ORDER' + Date.now();
            
            // 这里需要实现签名逻辑，简化示例直接调用
            // 实际使用时需要根据后端要求计算 sign
            const sign = generateSign(orderId, selectedMemberType.price);
            
            try {
                const response = await fetch(`/createOrder?payId=${orderId}&type=1&price=${selectedMemberType.price}&memberType=${selectedMemberType.typeCode}&sign=${sign}`);
                const data = await response.json();
                
                if (data.code === 1) {
                    alert('订单创建成功！订单号：' + orderId);
                    console.log('订单信息:', data.data);
                    // 这里可以跳转到支付页面
                    // window.location.href = '/payPage/pay.html?orderId=' + data.data.orderId;
                } else {
                    alert('创建订单失败：' + data.msg);
                }
            } catch (error) {
                alert('网络错误：' + error.message);
            }
        }

        // 生成签名（简化示例，实际需要按照后端规则）
        function generateSign(payId, price) {
            // 这里需要根据实际的签名规则实现
            // 通常是 md5(payId + param + type + price + key)
            return 'demo_sign_' + payId;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').innerHTML = `<div class="error">${message}</div>`;
        }

        // 页面加载时获取会员类型
        window.onload = loadMemberTypes;
    </script>
</body>
</html>
