server.port=${PORT:8089}

# PostgreSQL Database (Supabase Transaction Pooler)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0&preparedStatementCacheSizeMiB=0}
spring.datasource.username=${DATABASE_USERNAME:postgres.kbeayypfyglnfflczefg}
spring.datasource.password=${DATABASE_PASSWORD:Mfk@260600local}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA Settings - Disable prepared statements for Supabase pooler compatibility
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false

# H2 Console (disabled)
spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=100MB


